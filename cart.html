<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Tech Nova | Your Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-wrapper { max-width: 800px; margin: 40px auto; padding: 0 5%; }
        .cart-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card); padding: 20px; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-info { display: flex; align-items: center; gap: 20px; }
        .item-info img { width: 60px; height: 60px; object-fit: contain; }
        
        .qty-controls { display: flex; align-items: center; gap: 12px; background: var(--bg); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); }
        .qty-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .trash-btn { color: #ef4444; border: none; background: none; cursor: pointer; font-size: 1.1rem; margin-left: 10px; }
        
        .cart-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 2px solid var(--border); padding-top: 20px; }
        .clear-btn { background: #fee2e2; color: #ef4444; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <nav>
        <div class="brand" onclick="location.href='index.html'" style="cursor:pointer">TECH NOVA</div>
        <a href="index.html" style="text-decoration:none; color:var(--text); font-weight:600;">← Back to Store</a>
    </nav>

    <div class="cart-wrapper">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Shopping Cart</h2>
            <button class="clear-btn" id="clear-btn-el" onclick="clearFullCart()"><i class="fas fa-trash"></i> Clear All</button>
        </div>
        
        <div id="cart-render-area"></div>

        <div class="cart-footer" id="cart-total-area">
            <div>
                <p style="opacity:0.7;">Grand Total</p>
                <h2 id="total-price" style="color:var(--primary)">₹0</h2>
            </div>
            <button class="checkout-btn" onclick="location.href='checkout.html'">Checkout Now</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        async function renderCart() {
            const cart = await fetchCart();
            const container = document.getElementById('cart-render-area');
            const totalArea = document.getElementById('cart-total-area');
            const clearBtn = document.getElementById('clear-btn-el');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:80px 20px; opacity:0.6;">
                        <i class="fas fa-shopping-basket" style="font-size:4rem; margin-bottom:20px; color:var(--border);"></i>
                        <h3>Your cart is empty</h3>
                        <p style="margin-bottom:25px;">Looks like you haven't added anything yet.</p>
                        <button onclick="location.href='index.html'" class="checkout-btn">Start Shopping</button>
                    </div>`;
                totalArea.style.display = "none";
                clearBtn.style.display = "none";
                return;
            }

            totalArea.style.display = "flex";
            clearBtn.style.display = "block";

            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div class="item-info">
                            <img src="${item.img}" alt="${item.name}">
                            <div>
                                <h4 style="font-size:0.95rem;">${item.name}</h4>
                                <p style="font-weight:700; color:var(--primary);">₹${item.price.toLocaleString()}</p>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty('${item.productId}', -1)">-</button>
                                <span style="min-width:20px; text-align:center;">${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty('${item.productId}', 1)">+</button>
                            </div>
                            <button class="trash-btn" onclick="deleteItem('${item.productId}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('total-price').innerText = `₹${total.toLocaleString()}`;
        }

        async function changeQty(productId, change) {
            await changeCartQty(productId, change);
            renderCart();
        }

        async function deleteItem(productId) {
            await removeCartItem(productId);
            renderCart();
        }

        async function clearFullCart() {
            if(confirm("Are you sure you want to delete everything in your cart?")) {
                await clearCart();
                renderCart();
            }
        }

        renderCart();
    </script>
</body>
</html>
