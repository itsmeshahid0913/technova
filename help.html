<!DOCTYPE html>
<html>
<head>
<title>Help Center - TechNova</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
header{background:#2563eb;color:#fff;padding:15px;font-size:22px}
.container{max-width:900px;margin:auto;padding:40px}
.card{background:#fff;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.08);margin-bottom:20px}

/* ===== Premium Mini Header ===== */
.mini-header{
  height:70px;
  padding:0 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f172a;
  position:sticky;
  top:0;
  z-index:1000;
}

/* Logo */
.logo{
  color:white;
  font-size:26px;
  font-weight:900;
  letter-spacing:1px;
  text-decoration:none;
}

/* Home button */
.home-btn{
  color:white;
  text-decoration:none;
  font-weight:600;
  padding:10px 20px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:6px;
  transition:0.25s;
}

.home-btn:hover{
  background:#2563eb;
  border-color:#2563eb;
}

/* ===== Page content styling ===== */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f5f9;
}

.container{
  max-width:900px;
  margin:70px auto;
  padding:0 20px;
}

.container h1{
  font-size:42px;
  color:#0f172a;
  margin-bottom:15px;
}

.container p{
  font-size:18px;
  color:#475569;
  line-height:1.7;
}

/* ===== Mobile ===== */
@media(max-width:768px){
  .mini-header{
    padding:0 20px;
  }
  .logo{font-size:22px;}
  .home-btn{padding:8px 14px;}
  .container h1{font-size:30px;}
}
</style>
</head>
<body>

  <header class="mini-header">
  <a href="index.html" class="logo">TechNova</a>
  <a href="index.html" class="home-btn">Home</a>
</header>


<header>Help Center</header>

<div class="container">
<div class="card">
<h2>Frequently Asked Questions</h2>
<p><b>How to place order?</b><br>Select product → Add to cart → Checkout.</p>
<p><b>Payment methods?</b><br>UPI, Cards, NetBanking, COD.</p>
<p><b>Order not received?</b><br>Contact support@technova.com</p>
</div>
</div>

</body>
</html>
