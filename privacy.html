<!DOCTYPE html>
<html>
<head>
<title>Privacy Policy - TechNova</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
header{background:#2563eb;color:#fff;padding:15px;font-size:22px}
.container{max-width:900px;margin:auto;padding:40px}

/* ===== Premium Mini Header ===== */
.mini-header{
  height:70px;
  padding:0 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f172a;
  position:sticky;
  top:0;
  z-index:1000;
}

/* Logo */
.logo{
  color:white;
  font-size:26px;
  font-weight:900;
  letter-spacing:1px;
  text-decoration:none;
}

/* Home button */
.home-btn{
  color:white;
  text-decoration:none;
  font-weight:600;
  padding:10px 20px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:6px;
  transition:0.25s;
}

.home-btn:hover{
  background:#2563eb;
  border-color:#2563eb;
}

/* ===== Page content styling ===== */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f5f9;
}

.container{
  max-width:900px;
  margin:70px auto;
  padding:0 20px;
}

.container h1{
  font-size:42px;
  color:#0f172a;
  margin-bottom:15px;
}

.container p{
  font-size:18px;
  color:#475569;
  line-height:1.7;
}

/* ===== Mobile ===== */
@media(max-width:768px){
  .mini-header{
    padding:0 20px;
  }
  .logo{font-size:22px;}
  .home-btn{padding:8px 14px;}
  .container h1{font-size:30px;}
}
</style>
</head>
<body>

 <header class="mini-header">
  <a href="index.html" class="logo">TechNova</a>
  <a href="index.html" class="home-btn">Home</a>
</header>

<header>Privacy Policy</header>

<div class="container">
<h2>Your Data is Safe</h2>
<p>We do not sell or share your personal data.</p>
<p>All payments are securely processed.</p>
<p>Your information is used only for order delivery.</p>
</div>

</body>
</html>
